<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Distrito 5</title>
    <style>
        /* Fondo oscuro para que resalten las cartas */
        body { 
            background-color: #0d0d0d; 
            margin: 0; 
            padding: 0; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        /* Contenedor para las imágenes */
        .menu-container {
            width: 100%;
            max-width: 600px; /* Tamaño ideal para celulares */
        }

        img { 
            width: 100%; 
            height: auto;
            display: block;
            margin-bottom: 0; /* Para que parezcan una sola pieza larga */
        }
    </style>
</head>
<body>
    <div class="menu-container">
        <img src="menu1.jpg" alt="Carta 1">
        <img src="menu2.jpg" alt="Carta 2">
        <img src="menu3.jpg" alt="Carta 3">
        <img src="menu4.jpeg" alt="Carta 4">
        <img src="menu5.jpeg" alt="Carta 5">
    </div>
</body>
</html>
